<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEFCON Analitik PRO</title>
    
    <!-- React & Babel CDN (Kurulumsuz çalışması için) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #020617; color: white; margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #0f172a; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // --- İKONLAR (Telefonda sorunsuz çalışması için gömülü SVG'ler) ---
        const Globe = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>;
        const MapPin = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>;
        const Rocket = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"/><path d="m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"/><path d="M9 12H4s.55-3.03 2-4c1.62-1.08 5 0 5 0"/><path d="M12 15v5s3.03-.55 4-2c1.08-1.62 0-5 0-5"/></svg>;
        const Target = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>;
        const Activity = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>;
        const Shield = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>;
        const ShieldAlert = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>;
        const Info = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>;
        const Zap = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>;
        const Wind = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9.59 4.59A2 2 0 1 1 11 8H2m10.59 11.41A2 2 0 1 0 14 16H2m15.73-8.27A2.5 2.5 0 1 1 19.5 12H2"/></svg>;

        // --- VERİTABANI ---
        const COUNTRIES = [
            { id: 'il', name: 'İsrail', lat: 31.04, lon: 34.85, defenseScore: 99, systems: 'Demir Kubbe, Davud\'un Sapanı, Arrow 2/3, Patriot' },
            { id: 'us', name: 'ABD', lat: 37.09, lon: -95.71, defenseScore: 98, systems: 'GMD, THAAD, Aegis, Patriot PAC-3' },
            { id: 'ru', name: 'Rusya', lat: 61.52, lon: 105.31, defenseScore: 96, systems: 'S-400, S-500 Prometheus, A-135, Pantsir-S1' },
            { id: 'cn', name: 'Çin', lat: 35.86, lon: 104.19, defenseScore: 95, systems: 'HQ-9B, HQ-19, S-400, HQ-22' },
            { id: 'jp', name: 'Japonya', lat: 36.20, lon: 138.25, defenseScore: 94, systems: 'Aegis (SM-3), Patriot PAC-3 MSE' },
            { id: 'tr', name: 'Türkiye', lat: 38.96, lon: 35.24, defenseScore: 86, systems: 'SİPER, HİSAR O+/A+, S-400, KORKUT' },
            { id: 'fr', name: 'Fransa', lat: 46.22, lon: 2.21, defenseScore: 89, systems: 'SAMP/T Mamba, Crotale NG, Aster 30' },
            { id: 'uk', name: 'İngiltere', lat: 55.37, lon: -3.43, defenseScore: 88, systems: 'Sky Sabre, Type 45 Destroyer' },
            { id: 'in', name: 'Hindistan', lat: 20.59, lon: 78.96, defenseScore: 88, systems: 'S-400, Barak-8, PAD' },
            { id: 'de', name: 'Almanya', lat: 51.16, lon: 10.45, defenseScore: 87, systems: 'Patriot, IRIS-T SLM, MANTIS' },
            { id: 'ua', name: 'Ukrayna', lat: 48.37, lon: 31.16, defenseScore: 82, systems: 'Patriot, NASAMS, IRIS-T, S-300' },
            { id: 'ir', name: 'İran', lat: 32.42, lon: 53.68, defenseScore: 78, systems: 'Bavar-373, S-300PMU2, Tor-M1' },
            { id: 'eg', name: 'Mısır', lat: 26.82, lon: 30.80, defenseScore: 76, systems: 'S-300VM, Buk-M2, Patriot' },
            { id: 'pk', name: 'Pakistan', lat: 30.37, lon: 69.34, defenseScore: 75, systems: 'HQ-9/P, HQ-16, Spada 2000' },
            { id: 'sy', name: 'Suriye', lat: 34.80, lon: 38.99, defenseScore: 50, systems: 'Pantsir-S1, S-300, Buk-M2 (Hasarlı)' },
            { id: 'iq', name: 'Irak', lat: 33.22, lon: 43.67, defenseScore: 40, systems: 'Pantsir-S1, Avenger' },
            { id: 'lb', name: 'Lübnan', lat: 33.85, lon: 35.86, defenseScore: 15, systems: 'Eski omuzdan atılan MANPADS' }
        ].sort((a, b) => a.name.localeCompare(b.name));

        const MISSILES = [
            { id: 'us_1', origin: 'ABD', name: 'Minuteman III', type: 'ICBM', speed: 'Mach 23', range: 13000, attackScore: 94, desc: 'Atmosfer dışından devasa bir hızla inen kıtalararası balistik füze.' },
            { id: 'us_3', origin: 'ABD', name: 'BGM-109 Tomahawk', type: 'CRUISE', speed: 'Mach 0.74', range: 2500, attackScore: 82, desc: 'Radarların altından, araziyi yalayarak uçan klasik Amerikan seyir füzesi.' },
            { id: 'ru_1', origin: 'Rusya', name: 'RS-28 Sarmat', type: 'ICBM', speed: 'Mach 20+', range: 18000, attackScore: 99, desc: 'Dünyanın en ağır ve uzun menzilli kıtalararası füzesi.' },
            { id: 'ru_2', origin: 'Rusya', name: 'Iskander-M', type: 'SRBM', speed: 'Mach 6-7', range: 500, attackScore: 88, desc: 'Aşırı G kuvvetiyle manevralar yapan, sahte hedef bırakan kısa menzilli taktik füze.' },
            { id: 'ru_3', origin: 'Rusya', name: 'Kinzhal', type: 'HYPERSONIC', speed: 'Mach 10', range: 2000, attackScore: 95, desc: 'Savaş uçaklarından fırlatılan, hava savunmalarına tepki süresi bırakmayan hipersonik füze.' },
            { id: 'cn_1', origin: 'Çin', name: 'DF-41', type: 'ICBM', speed: 'Mach 25', range: 15000, attackScore: 96, desc: 'Çoklu bağımsız başlık (MIRV) taşıyan gelişmiş kıtalararası balistik füze.' },
            { id: 'tr_1', origin: 'Türkiye', name: 'Tayfun', type: 'SRBM', speed: 'Mach 5+', range: 561, attackScore: 82, desc: 'Türkiye\'nin bilinen en uzun menzilli, hızlı taktik balistik füzesi.' },
            { id: 'tr_2', origin: 'Türkiye', name: 'Bora', type: 'SRBM', speed: 'Mach 4', range: 280, attackScore: 78, desc: 'Yüksek isabet oranına sahip (CEP < 10m) hassas vuruş füzesi.' },
            { id: 'tr_3', origin: 'Türkiye', name: 'SOM', type: 'STEALTH_CRUISE', speed: 'Mach 0.9', range: 250, attackScore: 86, desc: 'Çok düşük radar izine sahip, yeryüzü şekillerini takip eden akıllı seyir füzesi.' },
            { id: 'il_1', origin: 'İsrail', name: 'Jericho III', type: 'ICBM', speed: 'Mach 15+', range: 6500, attackScore: 93, desc: 'İsrail nükleer caydırıcılığının temeli, uzun menzilli balistik füze.' },
            { id: 'ir_1', origin: 'İran', name: 'Sejjil', type: 'MRBM', speed: 'Mach 13', range: 2500, attackScore: 84, desc: 'Katı yakıtlı, hızlı hazırlanan orta menzilli balistik füze.' },
            { id: 'ir_2', origin: 'İran', name: 'Fattah-1', type: 'HYPERSONIC', speed: 'Mach 13', range: 1400, attackScore: 92, desc: 'İran\'ın hipersonik manevra kabiliyetine sahip füzesi.' },
            { id: 'otr_1', origin: 'Sovyetler', name: 'SCUD-B', type: 'SRBM', speed: 'Mach 4', range: 300, attackScore: 40, desc: 'Körfez Savaşı\'nın eski nesil füzesi. Havada vurulması en kolay hedeftir.' }
        ].sort((a, b) => a.origin.localeCompare(b.origin));

        const calculateDistance = (lat1, lon1, lat2, lon2) => {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return Math.round(2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)) * R);
        };

        function App() {
            const [launchCountryId, setLaunchCountryId] = useState('');
            const [missileId, setMissileId] = useState('');
            const [targetCountryId, setTargetCountryId] = useState('');
            const [launchCount, setLaunchCount] = useState(20);
            const [isSimulating, setIsSimulating] = useState(false);
            const [simResult, setSimResult] = useState(null);
            
            const launchCountry = COUNTRIES.find(c => c.id === launchCountryId);
            const missile = MISSILES.find(m => m.id === missileId);
            const targetCountry = COUNTRIES.find(c => c.id === targetCountryId);

            const reachableTargets = useMemo(() => {
                if (!launchCountry || !missile) return [];
                return COUNTRIES.filter(country => {
                    if (country.id === launchCountry.id) return false;
                    const dist = calculateDistance(launchCountry.lat, launchCountry.lon, country.lat, country.lon);
                    return dist <= missile.range;
                }).map(country => ({
                    ...country,
                    distance: calculateDistance(launchCountry.lat, launchCountry.lon, country.lat, country.lon)
                })).sort((a, b) => a.distance - b.distance);
            }, [launchCountry, missile]);

            useEffect(() => {
                if (targetCountryId && !reachableTargets.find(t => t.id === targetCountryId)) {
                    setTargetCountryId('');
                }
            }, [reachableTargets, targetCountryId]);

            const handleLaunch = () => {
                if (!launchCountry || !missile || !targetCountry || launchCount <= 0) return;
                setIsSimulating(true);
                setSimResult(null);

                setTimeout(() => {
                    let hits = 0;
                    let intercepted = 0;
                    let adjustedDefense = targetCountry.defenseScore;

                    if (missile.type === 'HYPERSONIC') adjustedDefense *= 0.25; 
                    else if (missile.type === 'ICBM' && targetCountry.defenseScore < 92) adjustedDefense *= 0.35;
                    else if (missile.type === 'STEALTH_CRUISE') adjustedDefense = Math.max(0, adjustedDefense - 25);
                    else if (missile.type === 'CRUISE' || missile.attackScore < 60) adjustedDefense = Math.min(100, adjustedDefense + 10);

                    let rawHitChance = missile.attackScore / (missile.attackScore + Math.max(5, adjustedDefense));
                    const hitChance = Math.max(0.01, Math.min(0.99, rawHitChance));

                    for (let i = 0; i < launchCount; i++) {
                        if (Math.random() < hitChance) hits++; else intercepted++;
                    }

                    setSimResult({ total: launchCount, hits, intercepted, hitChance: Math.round(hitChance * 100), adjustedDefense: Math.round(adjustedDefense) });
                    setIsSimulating(false);
                }, 2000);
            };

            const getTypeColor = (type) => {
                if(type === 'HYPERSONIC') return 'text-purple-400 bg-purple-950/50 border-purple-800';
                if(type === 'ICBM') return 'text-red-400 bg-red-950/50 border-red-800';
                if(type === 'STEALTH_CRUISE') return 'text-indigo-400 bg-indigo-950/50 border-indigo-800';
                if(type === 'CRUISE') return 'text-blue-400 bg-blue-950/50 border-blue-800';
                return 'text-orange-400 bg-orange-950/50 border-orange-800';
            };

            return (
                <div className="min-h-screen p-4 md:p-8">
                    <header className="max-w-6xl mx-auto mb-6 flex items-center gap-3 border-b border-slate-800 pb-4">
                        <Globe className="w-8 h-8 text-emerald-500" />
                        <div>
                            <h1 className="text-2xl font-black text-white tracking-wide">DEFCON Analitik <span className="text-emerald-500">PRO</span></h1>
                            <p className="text-slate-400 text-xs mt-1">Tek Dosya Taktik Simülasyon</p>
                        </div>
                    </header>

                    <main className="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-6">
                        {/* KONTROLLER */}
                        <div className="space-y-4">
                            <div className="bg-slate-900 rounded-xl p-4 border border-slate-800">
                                <label className="flex items-center gap-2 text-sm font-bold text-slate-300 mb-2 uppercase">
                                    <MapPin className="w-4 h-4 text-emerald-400" /> 1. Kalkış Üssü
                                </label>
                                <select className="w-full bg-slate-950 border border-slate-700 rounded-lg p-3 text-white focus:ring-2 focus:ring-emerald-500 outline-none" value={launchCountryId} onChange={(e) => setLaunchCountryId(e.target.value)} disabled={isSimulating}>
                                    <option value="">-- Ülke Seçiniz --</option>
                                    {COUNTRIES.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
                                </select>
                            </div>

                            <div className="bg-slate-900 rounded-xl p-4 border border-slate-800">
                                <label className="flex items-center gap-2 text-sm font-bold text-slate-300 mb-2 uppercase">
                                    <Rocket className="w-4 h-4 text-orange-400" /> 2. Mühimmat Seçimi
                                </label>
                                <select className="w-full bg-slate-950 border border-slate-700 rounded-lg p-3 text-white focus:ring-2 focus:ring-orange-500 outline-none mb-3" value={missileId} onChange={(e) => setMissileId(e.target.value)} disabled={isSimulating}>
                                    <option value="">-- Füze Seçiniz --</option>
                                    {MISSILES.map(m => <option key={m.id} value={m.id}>[{m.origin}] {m.name}</option>)}
                                </select>
                                {missile && (
                                    <div className="bg-slate-950 rounded-lg p-3 border border-slate-700 text-sm">
                                        <div className="flex justify-between items-center mb-2">
                                            <span className="font-bold text-white">{missile.name}</span>
                                            <span className={`px-2 py-0.5 text-xs font-bold rounded border ${getTypeColor(missile.type)}`}>{missile.type}</span>
                                        </div>
                                        <div className="text-slate-400 text-xs mb-1">Menzil: <span className="text-white">{missile.range} km</span> | Güç: <span className="text-orange-400">{missile.attackScore}/100</span></div>
                                        <div className="text-slate-500 text-xs">{missile.desc}</div>
                                    </div>
                                )}
                            </div>

                            <div className={`bg-slate-900 rounded-xl p-4 border ${launchCountry && missile ? 'border-red-900/50' : 'border-slate-800'}`}>
                                <label className="flex items-center gap-2 text-sm font-bold text-slate-300 mb-2 uppercase">
                                    <Target className="w-4 h-4 text-red-400" /> 3. Hedef Bölge
                                </label>
                                <select className="w-full bg-slate-950 border border-slate-700 rounded-lg p-3 text-white focus:ring-2 focus:ring-red-500 outline-none mb-3" value={targetCountryId} onChange={(e) => setTargetCountryId(e.target.value)} disabled={isSimulating || reachableTargets.length === 0}>
                                    <option value="">-- {reachableTargets.length} Olası Hedef --</option>
                                    {reachableTargets.map(t => <option key={t.id} value={t.id}>{t.name} (Mesafe: {t.distance}km)</option>)}
                                </select>
                                {targetCountry && (
                                    <div className="bg-slate-950 rounded-lg p-3 border border-slate-700 text-sm">
                                        <div className="flex justify-between items-center mb-1">
                                            <span className="font-bold text-blue-400">Savunma Gücü: {targetCountry.defenseScore}/100</span>
                                        </div>
                                        <div className="text-slate-400 text-xs">{targetCountry.systems}</div>
                                    </div>
                                )}
                            </div>

                            <div className="bg-slate-900 rounded-xl p-4 border border-slate-800 flex gap-3">
                                <div className="w-1/3">
                                    <label className="block text-xs text-slate-400 mb-1">Adet</label>
                                    <input type="number" min="1" max="1000" className="w-full bg-slate-950 border border-slate-700 rounded-lg p-3 text-white text-center focus:ring-2 focus:ring-red-500 outline-none" value={launchCount} onChange={(e) => setLaunchCount(parseInt(e.target.value)||0)} disabled={isSimulating}/>
                                </div>
                                <button onClick={handleLaunch} disabled={!targetCountry || isSimulating || launchCount <= 0} className={`w-2/3 rounded-lg font-bold text-white flex items-center justify-center gap-2 ${isSimulating ? 'bg-orange-600 animate-pulse' : !targetCountry ? 'bg-slate-800 text-slate-500' : 'bg-red-600 hover:bg-red-500'}`}>
                                    {isSimulating ? 'İŞLENİYOR...' : <><Zap className="w-5 h-5"/> ATEŞLE</>}
                                </button>
                            </div>
                        </div>

                        {/* MONİTÖR */}
                        <div className="bg-black rounded-xl border border-slate-700 p-4 relative overflow-hidden flex flex-col min-h-[400px]">
                            <div className="absolute inset-0 bg-[linear-gradient(rgba(16,185,129,0.05)_1px,transparent_1px),linear-gradient(90deg,rgba(16,185,129,0.05)_1px,transparent_1px)] bg-[size:30px_30px] opacity-50"></div>
                            <h2 className="text-lg font-mono text-emerald-400 flex items-center gap-2 mb-4 relative z-10 border-b border-slate-800 pb-2"><Wind className="w-4 h-4"/> SAVAŞ EKRANI</h2>
                            
                            {!simResult && !isSimulating && (
                                <div className="flex-1 flex flex-col items-center justify-center text-slate-600 font-mono text-center relative z-10">
                                    <Shield className="w-16 h-16 mb-2 opacity-20" />
                                    <p>SİSTEM HAZIR</p>
                                </div>
                            )}

                            {isSimulating && (
                                <div className="flex-1 flex flex-col items-center justify-center font-mono text-center relative z-10">
                                    <Rocket className="w-16 h-16 text-red-500 animate-bounce mb-4" />
                                    <div className="text-red-500 font-bold tracking-widest">ÇARPIŞMA BEKLENİYOR...</div>
                                </div>
                            )}

                            {simResult && !isSimulating && (
                                <div className="flex-1 flex flex-col justify-center relative z-10 animate-in fade-in duration-500">
                                    <div className="text-center mb-6">
                                        <h3 className="text-2xl font-black text-white mb-2">HASAR RAPORU</h3>
                                        <div className="text-sm font-mono text-slate-400">{launchCountry.name} ➔ {targetCountry.name}</div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-4 mb-6">
                                        <div className="bg-slate-900 border border-red-900/50 p-4 rounded-xl text-center">
                                            <div className="text-red-500 text-xs font-bold mb-1">HEDEFİ VURAN</div>
                                            <div className="text-4xl font-black text-red-500">{simResult.hits}</div>
                                        </div>
                                        <div className="bg-slate-900 border border-blue-900/50 p-4 rounded-xl text-center">
                                            <div className="text-blue-400 text-xs font-bold mb-1">HAVADA İMHA</div>
                                            <div className="text-4xl font-black text-blue-400">{simResult.intercepted}</div>
                                        </div>
                                    </div>
                                    <div className="bg-slate-900/80 p-3 rounded border border-slate-800 text-sm font-mono">
                                        <div className="flex justify-between mb-2"><span className="text-slate-500">Füze:</span> <span className="text-white">{missile.name}</span></div>
                                        <div className="flex justify-between mb-2"><span className="text-slate-500">Delme Şansı:</span> <span className="text-yellow-400">% {simResult.hitChance}</span></div>
                                        <div className="text-center mt-4 pt-3 border-t border-slate-700 font-bold text-orange-400">
                                            {simResult.hits === 0 ? <span className="text-blue-400">KUSURSUZ SAVUNMA</span> : simResult.hits > (simResult.total * 0.7) ? <span className="text-red-500">YIKICI DARBE (SAVUNMA ÇÖKTÜ)</span> : 'KISMİ HASAR'}
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
